<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ETQ — Guided walkthrough</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f8f2e6;
    --cream-soft: #fbf6ec;
    --paper: #fffdf8;
    --ink: #1a2327;
    --ink-soft: #415058;
    --muted: #5e6970;
    --muted-soft: #7d8a90;
    --forest: #1f3a35;
    --forest-deep: #12231f;
    --accent: #0f766e;
    --amber: #b2742a;
    --amber-strong: #8a5a1f;
    --rule: #e3d9c4;
    --focus-ring: rgba(31, 58, 53, 0.55);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Inter", "Aptos", "Segoe UI", sans-serif;
    color: var(--ink);
    background: var(--cream);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  body::before {
    content: ""; position: fixed; inset: 0;
    background: radial-gradient(at 85% 15%, rgba(178,116,42,0.08), transparent 60%);
    pointer-events: none; z-index: 0;
  }
  a { color: var(--forest); }

  nav.top {
    position: sticky; top: 0; z-index: 10;
    background: var(--cream);
    border-bottom: 1px solid rgba(101, 79, 52, 0.07);
    box-shadow: none;
  }
  nav.top .inner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 40px 11px; max-width: 1280px; margin: 0 auto;
  }
  .wordmark {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: "Cormorant Garamond", Georgia, serif;
    font-weight: 600; font-size: 19px; letter-spacing: 0.02em;
    color: var(--forest);
    text-decoration: none;
  }
  .wordmark svg { width: 26px; height: 13px; }

  .nav-actions { display: inline-flex; align-items: center; gap: 22px; }
  .nav-currency, .nav-jump, .nav-restart {
    font-family: "Inter", sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.01em;
    line-height: 1.2;
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 6px 2px;
    cursor: pointer;
    transition: color 160ms ease;
  }
  .nav-restart { color: var(--muted); }
  .nav-restart:hover { color: var(--ink-soft); }
  .nav-jump { color: var(--forest); }
  .nav-jump:hover { color: var(--forest-deep); }

  .nav-currency {
    position: relative;
    display: inline-flex;
    align-items: center;
    padding: 5px 10px 5px 12px;
    color: var(--ink-soft);
    border: 1px solid var(--rule);
    border-radius: 999px;
    transition: border-color 160ms ease, color 160ms ease, background 160ms ease;
  }
  .nav-currency::after {
    content: "";
    width: 6px; height: 6px;
    margin-left: 8px;
    border-right: 1px solid currentColor;
    border-bottom: 1px solid currentColor;
    transform: translateY(-2px) rotate(45deg);
    opacity: 0.7;
    transition: opacity 160ms ease;
  }
  .nav-currency:hover, .nav-currency:focus-within {
    color: var(--forest);
    border-color: var(--forest);
    background: var(--cream-soft);
  }
  .nav-currency:hover::after, .nav-currency:focus-within::after { opacity: 1; }
  .nav-currency-value { display: block; line-height: 1.2; }
  .nav-currency-select {
    position: absolute;
    inset: 0;
    width: 100%;
    min-width: 100%;
    height: 100%;
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 0;
    margin: 0;
    appearance: none;
    -webkit-appearance: none;
    opacity: 0;
    cursor: pointer;
  }

  .confirm-overlay {
    position: fixed; inset: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    background: rgba(18, 35, 31, 0.25);
    backdrop-filter: blur(2px);
    animation: confirm-fade-in 0.15s ease-out;
  }
  @keyframes confirm-fade-in { from { opacity: 0; } }
  .confirm-dialog {
    position: relative;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 4px;
    box-shadow: 0 24px 48px -12px rgba(18, 35, 31, 0.25);
    padding: 28px 32px 22px;
    max-width: 420px; width: 90%;
    animation: confirm-slide-in 0.15s ease-out;
  }
  @keyframes confirm-slide-in { from { opacity: 0; transform: translateY(-8px) scale(0.97); } }
  .confirm-dialog p {
    margin: 0 0 22px;
    font-size: 15px; line-height: 1.5;
    color: var(--ink);
    font-family: "Inter", sans-serif;
  }
  .confirm-actions {
    display: flex; justify-content: flex-end; gap: 12px;
  }
  .confirm-cancel, .confirm-ok {
    padding: 10px 20px;
    font-family: "Inter", sans-serif;
    font-size: 13px; font-weight: 500;
    letter-spacing: 0.04em;
    border-radius: 2px; cursor: pointer;
    transition: background 160ms ease, border-color 160ms ease, color 160ms ease;
  }
  .confirm-cancel {
    background: var(--paper);
    border: 1px solid var(--rule);
    color: var(--ink-soft);
  }
  .confirm-cancel:hover { background: var(--cream); border-color: var(--forest); color: var(--forest); }
  .confirm-ok {
    background: var(--amber);
    border: 1px solid var(--amber);
    color: var(--cream-soft);
  }
  .confirm-ok:hover { background: #9a6324; border-color: #9a6324; }

  .ob-shell {
    position: relative; z-index: 1;
    max-width: 1280px; margin: 0 auto;
    padding: 48px 40px 120px;
    display: grid;
    grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr);
    gap: 88px;
  }

  /* Left column */
  .ob-conversation {
    display: flex; flex-direction: column; gap: 4px;
    list-style: none; padding: 0; margin: 0;
  }
  .ob-list-item { display: block; }

  .ob-card {
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 8px 0 32px;
    box-shadow: none;
  }
  .ob-card[data-animate-in="true"] {
    animation: ob-card-in 280ms ease-out both;
  }
  @keyframes ob-card-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .ob-card[data-animate-in="true"] { animation: none; }
  }
  .ob-list-item[data-sticky="true"] {
    position: sticky;
    top: 52px;
    z-index: 2;
    background: var(--cream);
    border-radius: 14px 14px 0 0;
  }
  .ob-list-item[data-sticky="true"] .ob-card {
    padding: 32px 32px 18px;
    border-bottom: 1px solid var(--rule);
  }

  .ob-card-topbar {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin: 0 0 14px;
  }
  .ob-card-topbar .ob-back { margin: 0; }
  .ob-card-topbar .ob-forward {
    position: relative;
    padding-left: 14px;
  }
  .ob-card-topbar .ob-forward:first-child {
    padding-left: 0;
  }
  .ob-card-topbar .ob-forward:first-child::before { display: none; }
  .ob-card-topbar .ob-forward::before {
    content: "";
    position: absolute;
    left: 2px; top: 50%;
    width: 1px; height: 11px;
    background: var(--rule);
    transform: translateY(-50%);
  }
  .ob-card-topbar .ob-jump-latest {
    margin-left: auto;
    padding-right: 4px;
  }
  .ob-eyebrow {
    font-family: "Inter", sans-serif;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--amber);
    margin: 0 0 16px;
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }
  .ob-eyebrow .ob-card-counter {
    font-weight: 400;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    text-transform: none;
    font-size: 12px;
  }
  .ob-prompt {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-weight: 500;
    font-size: clamp(30px, 3.2vw, 42px);
    line-height: 1.12;
    color: var(--forest-deep);
    margin: 0 0 12px;
  }
  .ob-helper {
    font-size: 15px;
    color: var(--ink-soft);
    margin: 0 0 28px;
    max-width: 52ch;
  }

  .ob-input-row {
    display: flex; align-items: baseline; gap: 6px;
    border-bottom: 1px solid var(--rule);
    padding: 4px 0 8px;
    margin-bottom: 28px;
  }
  .ob-input-prefix,
  .ob-input-suffix {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 28px; color: var(--muted);
  }
  .ob-input-prefix.is-currency-code,
  .ob-le-prefix.is-currency-code {
    font-family: "Inter", sans-serif;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    line-height: 1;
    color: var(--muted);
    transform: translateY(-1px);
  }
  .ob-input {
    flex: 1;
    font-family: "Cormorant Garamond", Georgia, serif;
    font-weight: 500;
    font-size: 28px;
    color: var(--forest-deep);
    background: transparent;
    border: none; outline: none;
    padding: 4px 0;
    min-width: 0;
  }
  .ob-input-row:focus-within {
    border-bottom-color: var(--forest-deep);
    box-shadow: 0 1px 0 0 var(--forest-deep);
  }
  .ob-input--auto {
    flex: 0 0 auto;
    field-sizing: content;
    width: auto;
    min-width: 1.5ch;
  }
  .ob-input--auto + .ob-input-suffix { margin-left: 4px; }
  .ob-input::placeholder { color: var(--muted); }

  .ob-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 28px;
  }
  .ob-chip-btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: "Inter", sans-serif;
    font-size: 14px; font-weight: 400;
    letter-spacing: 0.02em;
    padding: 10px 22px;
    color: var(--forest-deep);
    background: transparent;
    border: 1px solid var(--forest-deep);
    border-radius: 999px;
    cursor: pointer;
    transition: background 160ms ease, color 160ms ease;
  }
  .ob-chip-btn:hover,
  .ob-chip-btn:focus-visible,
  .ob-chip-btn[aria-pressed="true"] {
    background: var(--forest-deep);
    color: var(--cream-soft);
    outline: none;
  }

  .ob-back {
    display: inline-flex; align-items: center; gap: 6px;
    background: none; border: none; padding: 2px 4px; margin: 0 0 16px;
    border-radius: 3px;
    font-family: "Inter", sans-serif;
    font-size: 13px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: color 160ms ease, box-shadow 160ms ease;
  }
  .ob-back:hover { color: var(--forest); }
  .ob-back:focus-visible {
    outline: none;
    color: var(--forest);
    box-shadow: 0 0 0 2px var(--cream), 0 0 0 4px var(--focus-ring);
  }
  .ob-back span { letter-spacing: 0.04em; }

  .ob-actions {
    display: flex; align-items: center; gap: 22px; flex-wrap: wrap;
  }
  .ob-actions .btn-primary {
    padding: 12px 26px;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.02em;
    border-radius: 999px;
    background: var(--forest-deep);
    color: var(--cream-soft);
    border-color: var(--forest-deep);
    box-shadow: none;
  }
  .ob-actions .btn-primary:hover:not(:disabled) {
    background: var(--forest);
    border-color: var(--forest);
  }
  .ob-actions .btn-primary:focus-visible {
    outline: none;
    box-shadow: 0 0 0 2px var(--cream), 0 0 0 4px var(--focus-ring);
  }
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 13px 24px;
    font-family: "Inter", sans-serif; font-size: 14px; font-weight: 500;
    letter-spacing: 0.04em;
    border-radius: 2px; text-decoration: none;
    transition: all 200ms ease;
    cursor: pointer; border: 1px solid transparent;
  }
  .btn-primary { background: var(--forest); color: var(--cream-soft); }
  .btn-primary:hover:not(:disabled) { background: var(--forest-deep); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .ob-skip {
    font-size: 14px;
    color: var(--ink-soft);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 4px;
    border-radius: 3px;
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: color 160ms ease, box-shadow 160ms ease;
  }
  .ob-skip:hover { color: var(--forest); }
  .ob-skip:focus-visible {
    outline: none;
    color: var(--forest);
    box-shadow: 0 0 0 2px var(--cream), 0 0 0 4px var(--focus-ring);
  }

  .ob-error {
    font-size: 14px;
    color: var(--amber-strong);
    margin-top: 8px;
    min-height: 1.3em;
  }

  .ob-chip {
    display: flex; align-items: baseline; gap: 18px;
    padding: 12px 32px;
    border-bottom: 1px solid rgba(227, 217, 196, 0.55);
    border-radius: 3px;
    cursor: pointer;
    transition: background-color 140ms ease;
  }
  .ob-chip:hover { background-color: rgba(255, 253, 248, 0.55); }
  .ob-chip:focus-visible {
    outline: none;
    background-color: rgba(255, 253, 248, 0.85);
    box-shadow: 0 0 0 2px var(--cream), 0 0 0 4px var(--focus-ring);
  }
  .ob-chip-label {
    font-family: "Inter", sans-serif;
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--ink-soft);
    flex: 0 0 auto;
    min-width: 25%;
    max-width: 38%;
  }
  .ob-chip-value {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 19px;
    line-height: 1.25;
    color: var(--forest-deep);
    flex: 1 1 auto;
  }
  .ob-chip-assumption {
    display: block;
    font-family: "Inter", sans-serif;
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.03em;
  }
  .ob-chip-edit {
    font-family: "Inter", sans-serif;
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--ink-soft);
    opacity: 0;
    flex: 0 0 auto;
    transition: opacity 160ms ease, color 160ms ease;
  }
  .ob-chip:hover .ob-chip-edit,
  .ob-chip:focus-visible .ob-chip-edit { opacity: 1; color: var(--forest); }

  .ob-link {
    background: none; border: none;
    padding: 0; margin: 0;
    cursor: pointer;
    font-family: "Inter", sans-serif;
    font-size: 13px;
    color: var(--accent);
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .ob-link:hover { color: var(--forest); }
  .ob-break-it-down { margin: 18px 0 0; }

  .ob-le-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 24px;
    margin: 12px 0 14px;
  }
  .ob-le-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    padding: 6px 0;
    border-bottom: 1px solid var(--rule);
  }
  .ob-le-label {
    font-family: "Inter", sans-serif;
    font-size: 13px;
    color: var(--ink-soft);
    flex: 1 1 auto;
  }
  .ob-le-input-wrap {
    display: inline-flex;
    align-items: baseline;
    gap: 3px;
    flex: 0 0 auto;
  }
  .ob-le-prefix {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 16px;
    color: var(--muted);
  }
  .ob-le-input {
    width: 8ch;
    text-align: right;
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--forest-deep);
    background: transparent;
    border: none; outline: none;
    padding: 2px 0;
  }
  .ob-le-total {
    position: sticky;
    bottom: 0;
    z-index: 3;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 0;
    margin: 16px 0 2px;
    background: var(--cream);
    border-top: 1px solid var(--rule);
    box-shadow: 0 -10px 18px -12px rgba(26, 35, 39, 0.22);
  }
  .ob-le-total-label {
    font-family: "Inter", sans-serif;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .ob-le-total-value {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--forest-deep);
  }
  @media (max-width: 700px) {
    .ob-le-grid { grid-template-columns: 1fr; }
  }

  .ob-card-compact {
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 14px 18px;
    background: transparent;
    border: 1px dashed var(--rule);
    border-radius: 4px;
    box-shadow: none;
  }
  .ob-compact-add {
    flex: 0 1 auto;
    background: none; border: none;
    cursor: pointer;
    font-family: "Inter", sans-serif;
    font-size: 14px; font-weight: 500;
    color: var(--accent);
    padding: 6px 0;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 160ms ease, color 160ms ease;
  }
  .ob-compact-add::before { content: "+ "; }
  .ob-compact-add:hover { color: var(--forest); border-bottom-color: var(--accent); }
  .ob-compact-skip {
    flex: 0 0 auto;
    background: none; border: none;
    cursor: pointer;
    font-family: "Inter", sans-serif;
    font-size: 13px;
    color: var(--muted);
    padding: 6px 0;
  }
  .ob-compact-skip:hover { color: var(--ink-soft); }

  .ob-card-handoff {
    padding: 56px 56px 48px;
    background: linear-gradient(180deg, var(--cream-soft) 0%, var(--paper) 100%);
    border: 1px solid var(--rule);
    border-radius: 14px;
    box-shadow: 0 36px 72px -36px rgba(31, 58, 53, 0.28);
  }
  .ob-saved-toast {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(15, 118, 110, 0.12);
    color: var(--accent);
    font-family: "Inter", sans-serif;
    font-size: 13px;
    letter-spacing: 0.02em;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 200ms ease, transform 200ms ease;
  }
  .ob-saved-toast[data-visible="true"] {
    opacity: 1;
    transform: translateY(0);
  }
  .ob-saved-toast::before {
    content: "✓";
    font-weight: 600;
  }
  .ob-shell[data-on-handoff="true"] .ob-estimate {
    opacity: 0.35;
    pointer-events: none;
    transition: opacity 320ms ease;
  }
  .ob-handoff-label {
    font-family: "Inter", sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 6px 0 4px;
  }
  .ob-handoff-age {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-weight: 500;
    font-size: clamp(96px, 11vw, 168px);
    line-height: 1;
    color: var(--forest-deep);
    font-variant-numeric: tabular-nums;
    margin: 0 0 18px;
  }
  .ob-handoff-helper { max-width: 56ch; margin-bottom: 36px; }
  .ob-handoff-actions { gap: 28px; }
  @media (max-width: 960px) {
    .ob-card-handoff { padding: 32px 24px 28px; }
    .ob-handoff-age { font-size: 84px; }
    .ob-handoff-actions { gap: 16px; flex-direction: column; align-items: stretch; }
    .ob-handoff-actions > * { width: 100%; justify-content: center; text-align: center; }
  }

  .ob-chapter-divider {
    font-family: "Inter", sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--amber-strong);
    margin: 22px 0 4px;
    padding: 0 32px 4px;
  }
  /* Right column */
  .ob-estimate {
    position: sticky; top: 52px;
    align-self: start;
    background: transparent;
    border: 1px dashed rgba(227, 217, 196, 0.7);
    border-radius: 14px;
    padding: 28px 32px;
    box-shadow: none;
    transition:
      background 280ms ease,
      border-color 280ms ease,
      border-style 280ms ease,
      box-shadow 280ms ease,
      padding 280ms ease;
  }
  .ob-estimate[data-has-estimate="true"] {
    background: var(--paper);
    border-color: rgba(227, 217, 196, 0.6);
    border-style: solid;
    padding: 36px 36px 32px;
    box-shadow: 0 30px 60px -40px rgba(31,58,53,0.22);
  }
  .ob-estimate-placeholder-label {
    font-family: "Inter", sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 10px;
  }
  .ob-estimate[data-has-estimate="true"] .ob-estimate-placeholder-label { display: none; }
  .ob-estimate-label {
    font-family: "Inter", sans-serif;
    font-size: 14px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted);
    margin: 0 0 6px;
  }
  .ob-estimate-age {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-weight: 400;
    font-style: italic;
    font-size: clamp(80px, 9vw, 120px);
    line-height: 1.05;
    color: var(--forest-deep);
    opacity: 0.78;
    font-variant-numeric: tabular-nums;
    margin: 0 0 22px;
    transition: opacity 220ms ease, color 320ms ease;
  }
  .ob-estimate-age[data-state="empty"] {
    display: none;
  }
  .ob-estimate-age[data-changed="true"] {
    animation: ob-estimate-pulse 720ms ease-out;
  }
  @keyframes ob-estimate-pulse {
    0%   { color: var(--accent); }
    100% { color: var(--forest-deep); }
  }
  @media (prefers-reduced-motion: reduce) {
    .ob-estimate-age[data-changed="true"] { animation: none; }
  }
  .ob-estimate-delta-shift {
    display: inline-block;
    margin: -10px 0 16px;
    padding: 3px 10px;
    border-radius: 999px;
    background: rgba(15, 118, 110, 0.12);
    color: var(--accent);
    font-family: "Inter", sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.04em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 220ms ease;
  }
  .ob-estimate-delta-shift:empty { display: none; }
  .ob-estimate-delta-shift[data-visible="true"] { opacity: 1; }
  .ob-estimate-delta {
    font-size: 16px;
    color: var(--ink-soft);
    margin: 0 0 24px;
    min-height: 1.4em;
  }
  .ob-estimate-progress {
    font-family: "Inter", sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--muted);
    margin: 0;
    line-height: 1.4;
  }
  .ob-estimate-hero {
    display: flex;
    align-items: center;
    gap: 24px;
    margin: 0 0 22px;
  }
  .ob-estimate-hero .ob-estimate-age { margin: 0; }
  .ob-estimate-hero-meta {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
    /* Shift down to compensate for italic old-style figures whose
       descenders extend below the line box, so the visible glyph centre
       sits below the box centre that align-items: center references. */
    transform: translateY(16px);
  }
  .ob-estimate-hero-meta .ob-estimate-progress,
  .ob-estimate-hero-meta .ob-estimate-delta,
  .ob-estimate-hero-meta .ob-estimate-delta-shift {
    margin: 0;
  }
  .ob-estimate:not([data-has-estimate="true"]) .ob-estimate-hero { display: none; }
  .ob-estimate-placeholder {
    font-family: "Cormorant Garamond", Georgia, serif;
    font-size: 22px;
    line-height: 1.35;
    color: var(--ink-soft);
    margin: 4px 0 0;
    max-width: 32ch;
  }
  .ob-chart-wrap { margin: 12px 0 20px; display: none; position: relative; }
  .ob-chart-wrap[data-visible="true"] { display: block; }
  .ob-chart-tooltip {
    position: absolute;
    pointer-events: none;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 8px 10px;
    font-family: "Inter", sans-serif;
    font-size: 12px;
    color: var(--ink-soft);
    box-shadow: 0 12px 24px -16px rgba(31,58,53,0.25);
    white-space: nowrap;
    z-index: 2;
  }
  .ob-chart-tooltip-line { display: block; line-height: 1.4; }
  .ob-chart-tooltip-line.is-head {
    color: var(--forest-deep); font-weight: 500; margin-bottom: 2px;
  }
  .ob-chart-canvas {
    width: 100%;
    height: 180px;
    display: block;
    border-radius: 6px;
  }
  .ob-chart-legend {
    display: flex; gap: 16px; margin-top: 16px;
    font-size: 12px;
    color: var(--muted);
  }
  .ob-chart-legend-item { display: inline-flex; align-items: center; gap: 6px; }
  .ob-chart-legend-item[hidden] { display: none; }
  .ob-chart-legend-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--accent);
  }
  .ob-chart-legend-dot[data-series="networth"] { background: var(--forest); }
  .ob-chart-legend-item[data-dimmed="true"] { opacity: 0.5; }
  .ob-estimate-assumptions {
    font-size: 12px;
    color: var(--muted);
    margin: 20px 0 0;
    padding-top: 16px;
    border-top: 1px solid var(--rule);
  }
  .ob-estimate:not([data-has-estimate="true"]) .ob-estimate-assumptions {
    display: none;
  }
  .ob-estimate:not([data-has-estimate="true"]) .ob-estimate-label {
    display: none;
  }
  .ob-estimate-assumptions-summary {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
    list-style: none;
    line-height: 1.5;
  }
  .ob-estimate-assumptions-summary::-webkit-details-marker { display: none; }
  .ob-estimate-assumptions-summary-text { flex: 1; }
  .ob-estimate-assumptions-toggle {
    flex: 0 0 auto;
    width: 18px; height: 18px;
    border: 1px solid var(--rule);
    border-radius: 50%;
    position: relative;
    transition: border-color 160ms ease, color 160ms ease;
  }
  .ob-estimate-assumptions-toggle::before,
  .ob-estimate-assumptions-toggle::after {
    content: "";
    position: absolute;
    background: currentColor;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .ob-estimate-assumptions-toggle::before { width: 8px; height: 1px; }
  .ob-estimate-assumptions-toggle::after  { width: 1px; height: 8px; transition: opacity 160ms ease; }
  .ob-estimate-assumptions[open] .ob-estimate-assumptions-toggle::after { opacity: 0; }
  .ob-estimate-assumptions-summary:hover .ob-estimate-assumptions-toggle,
  .ob-estimate-assumptions[open] .ob-estimate-assumptions-toggle {
    border-color: var(--ink-soft);
    color: var(--ink-soft);
  }
  .ob-estimate-assumptions-section { margin-top: 14px; }
  .ob-estimate-assumptions-section-label {
    font-family: "Inter", sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 6px;
  }
  .ob-estimate-assumptions-list {
    margin: 0;
    padding: 0 0 0 18px;
    display: flex; flex-direction: column;
    gap: 6px;
    line-height: 1.5;
  }
  .ob-estimate-warning {
    font-size: 14px;
    color: var(--amber);
    margin: 0 0 20px;
  }

  @media (max-width: 960px) {
    nav.top .inner {
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      padding: 12px 20px;
    }
    .nav-actions {
      width: 100%;
      justify-content: flex-start;
      flex-wrap: wrap;
      gap: 14px 18px;
      margin-top: 2px;
    }
    .nav-jump { margin-left: auto; }
    .ob-shell {
      grid-template-columns: 1fr;
      gap: 20px;
      padding: 20px 20px 80px;
    }
    .ob-conversation { order: 2; }
    .ob-estimate,
    .ob-estimate[data-has-estimate="true"] {
      order: 1;
      position: sticky; top: 0;
      padding: 12px 16px 14px;
      min-height: 0;
      z-index: 6;
      background: rgba(255, 253, 248, 0.96);
      backdrop-filter: blur(6px) saturate(1.1);
      border-style: solid;
      border-color: rgba(227, 217, 196, 0.6);
      border-radius: 0 0 12px 12px;
      border-width: 0 0 1px 0;
      box-shadow: 0 8px 18px -16px rgba(31, 58, 53, 0.25);
      margin: 0 -20px;
    }
    .ob-estimate:not([data-has-estimate="true"]) {
      display: none;
    }
    .ob-estimate-age,
    .ob-estimate[data-has-estimate="true"] .ob-estimate-age {
      font-size: 48px;
      margin: 0 0 4px;
    }
    .ob-estimate-label { font-size: 11px; margin-bottom: 2px; }
    .ob-estimate-delta { font-size: 13px; line-height: 1.35; margin-bottom: 0; }
    .ob-estimate-delta-shift { margin: 0 0 6px; }
    .ob-estimate-warning { font-size: 13px; margin-bottom: 6px; }
    .ob-chart-wrap, .ob-estimate-assumptions { display: none !important; }
    .ob-card { padding: 8px 0 24px; }
    .ob-list-item[data-sticky="true"] {
      top: 0;
    }
    .ob-list-item[data-sticky="true"] .ob-card {
      padding: 18px 18px 14px;
    }
  }
  @media (max-width: 520px) {
    nav.top .inner { padding: 10px 16px; gap: 10px; }
    .wordmark { font-size: 17px; gap: 8px; }
    .wordmark svg { width: 22px; height: 11px; }
    .nav-actions { gap: 12px 14px; font-size: 12px; }
    .nav-currency, .nav-jump, .nav-restart { font-size: 12px; }
    .ob-shell { padding: 16px 16px 64px; gap: 16px; }
    .ob-prompt { font-size: clamp(26px, 7.6vw, 32px); }
    .ob-helper { font-size: 14px; margin-bottom: 22px; }
    .ob-input,
    .ob-input-prefix,
    .ob-input-suffix { font-size: 24px; }
    .ob-chip { padding: 10px 16px; gap: 12px; }
    .ob-chip-label { min-width: 35%; }
    .ob-chip-value { font-size: 17px; }
    .ob-chapter-divider { padding: 0 16px 4px; }
    .ob-card-handoff { padding: 28px 20px 24px; }
    .ob-handoff-age { font-size: 72px; }
    .ob-actions { gap: 12px; }
    .ob-actions .btn-primary { padding: 11px 22px; font-size: 14px; }
    .ob-estimate,
    .ob-estimate[data-has-estimate="true"] {
      padding: 10px 14px 12px;
      margin: 0 -16px;
    }
    .ob-estimate-age,
    .ob-estimate[data-has-estimate="true"] .ob-estimate-age { font-size: 40px; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
  }
</style>
